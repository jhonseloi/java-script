<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de números</h1>
    </header>
    <section>
        <div>
            <label for="txtnum">Número (entre 1 e 100): </label>
            <input type="number" name="num" id="txtnum">
            <input type="submit" value="Adicionar" onclick="numero()">
            <select name="form" id="txtform" size="100"> </select><br>
            <input type="submit" value="Finalizar" onclick="finalizar()">
        <div id="res"> </div>
    </section>
    <footer>
        <p>&copy JEF</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
